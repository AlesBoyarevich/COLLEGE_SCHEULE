{% extends 'base.html' %}
{% load static %}
{% block links %}
<link rel="stylesheet" href="{% static 'css/form.css' %}">
{% endblock %}
{% block main %}
<main>
    <h1 class="form-title">{{ headline }}</h1>
    <form class="form" method="post">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-field">
            <span style="color: red;">{{ field.errors }}</span>
            <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
            {{ field }}
        </div>
        {% endfor %}
        <button class="form-submit" type="submit">submit</button>
        <a style="color: #1A57FF; font-size: 24px; text-decoration: underline;" href="{% url 'signin' %}">Don't have account? Create it!</a>
    </form>
</main>
{% endblock %}
